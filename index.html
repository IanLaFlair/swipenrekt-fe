<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Swipe N Rekt — Swipe in-play football markets</title>
<meta name="description" content="Swipe in-play football prediction markets. Bet a moment, settle on-chain via Merkle proof, collect the rare ones. Powered by TxODDS on Solana devnet.">
<meta name="theme-color" content="#07070b">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<!-- from the design's <helmet> -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#07070b;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}:root{color-scheme:dark;}
  *{box-sizing:border-box;}
  @keyframes snrPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
  @keyframes snrPageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .snr-page{animation:snrPageIn .30s cubic-bezier(.22,.61,.36,1) both;will-change:opacity,transform;}
  @media (prefers-reduced-motion:reduce){.snr-page{animation:none;}}
  @keyframes dropIn{from{opacity:0;transform:scale(.62) translateY(30px) rotate(-7deg)}to{opacity:1;transform:scale(1) translateY(0) rotate(0)}}
  @keyframes packWiggle{0%,100%{transform:rotate(-1.4deg) translateY(0)}50%{transform:rotate(1.4deg) translateY(-5px)}}
  @keyframes shimmer{0%{background-position:-140% 0}100%{background-position:240% 0}}
  @keyframes pulseGlow{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.85;transform:scale(1.07)}}
  @keyframes burstRing{from{opacity:.85;transform:scale(.35)}to{opacity:0;transform:scale(2)}}
  ::-webkit-scrollbar{display:none;}
  /* The design marked these press states via style-active, which the old
     runtime silently ignored. Restored here as real :active feedback. */
  .snr-press:active{transform:scale(.9);}
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
